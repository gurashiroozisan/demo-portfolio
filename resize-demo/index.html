<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ResizeKit — 画像を一括リサイズするデスクトップアプリ（デモ）。">
  <title>ResizeKit | 画像リサイズ一括 Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="../index.html" class="back-link">← ポートフォリオ</a>

  <section class="landing">
    <p class="label">Desktop App Demo</p>
    <h1>画像リサイズ、<br><em>一括でサクッと。</em></h1>
    <p>Web用・SNS・サムネなど用途別プリセットで、複数画像をまとめてリサイズ。すべてブラウザ内で完結。</p>
  </section>

  <div class="desktop-wrap">
    <div class="window" id="app">
      <div class="titlebar">
        <div class="titlebar__dots"><span></span><span></span><span></span></div>
        <span class="titlebar__title">ResizeKit — 画像リサイズ一括</span>
        <span class="titlebar__demo">Demo</span>
      </div>
      <div class="window__body">
        <aside class="sidebar">
          <p class="sidebar__label">プリセット</p>
          <div class="preset-group">
            <button class="preset-btn active" data-width="1200">Web用（1200px）</button>
            <button class="preset-btn" data-width="1080">SNS（1080px）</button>
            <button class="preset-btn" data-width="400">サムネ（400px）</button>
          </div>
          <div class="custom-width">
            <label for="customWidth">カスタム幅</label>
            <div class="custom-width__row">
              <input type="number" id="customWidth" min="50" max="8000" placeholder="800" value="">
              <span>px</span>
            </div>
            <button class="preset-btn preset-btn--custom" id="applyCustomBtn">カスタムを適用</button>
          </div>
          <div class="sidebar__stats">
            <p>キュー: <strong id="queueCount">0</strong> 件</p>
            <p>完了: <strong id="doneCount">0</strong> 件</p>
          </div>
          <button class="btn-primary" id="processAllBtn" disabled>一括リサイズ</button>
          <button class="btn-secondary" id="clearBtn" disabled>キューをクリア</button>
          <p class="sidebar__note">※ ブラウザ上のデモです</p>
        </aside>
        <main class="main">
          <div class="toolbar">
            <label class="file-drop" id="fileDrop">
              <input type="file" id="fileInput" accept="image/*" multiple hidden>
              <span class="file-drop__icon">🖼</span>
              <span class="file-drop__text">画像を選択またはドロップ</span>
              <span class="file-drop__hint">PNG / JPG / WebP など</span>
            </label>
          </div>
          <div class="queue-empty" id="queueEmpty">
            <p>画像を追加するとここに一覧表示されます</p>
          </div>
          <ul class="queue-list" id="queueList"></ul>
        </main>
      </div>
    </div>
  </div>

  <section class="features">
    <div class="feature"><strong>プリセット対応</strong><span>Web・SNS・サムネなど用途別サイズをワンクリック</span></div>
    <div class="feature"><strong>一括処理</strong><span>複数画像をキューに追加してまとめてリサイズ</span></div>
    <div class="feature"><strong>クライアント完結</strong><span>Canvas APIで端末内処理。サーバー送信なし</span></div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
