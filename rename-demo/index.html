<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BatchRename — ファイル名を一括リネームするデスクトップアプリ（デモ）。">
  <title>BatchRename | 一括リネーム Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="../index.html" class="back-link">← ポートフォリオ</a>

  <section class="landing">
    <p class="label">Desktop App Demo</p>
    <h1>ファイル名、<br><em>まとめて一括変更。</em></h1>
    <p>プレフィックス・連番・置換ルールで複数ファイルを一度にリネーム。変更前にプレビュー確認。</p>
  </section>

  <div class="desktop-wrap">
    <div class="window" id="app">
      <div class="titlebar">
        <div class="titlebar__dots"><span></span><span></span><span></span></div>
        <span class="titlebar__title">BatchRename — 一括リネーム</span>
        <span class="titlebar__demo">Demo</span>
      </div>
      <div class="window__body">
        <aside class="sidebar">
          <p class="sidebar__label">リネームルール</p>
          <form class="rename-form" id="renameForm">
            <label>
              <span>プレフィックス</span>
              <input type="text" id="prefix" placeholder="例: 旅行_" value="旅行_">
            </label>
            <label>
              <span>連番開始</span>
              <input type="number" id="startNum" min="1" value="1">
            </label>
            <div class="replace-row">
              <label>
                <span>置換前</span>
                <input type="text" id="findText" placeholder="IMG_" value="IMG_">
              </label>
              <span class="arrow">→</span>
              <label>
                <span>置換後</span>
                <input type="text" id="replaceText" placeholder="写真_" value="写真_">
              </label>
            </div>
          </form>
          <button class="btn-primary" id="renameBtn">リネーム実行（デモ）</button>
          <button class="btn-reset hidden" id="resetBtn">リセット</button>
          <p class="sidebar__note">※ ブラウザ上のデモです</p>
        </aside>
        <main class="main">
          <div class="toolbar">
            <span id="pathLabel">選択中: 8件のファイル</span>
            <span class="toolbar__hint">プレビューはリアルタイム更新</span>
          </div>
          <div class="file-table-wrap">
            <table class="file-table">
              <thead>
                <tr>
                  <th>現在の名前</th>
                  <th class="arrow-col">→</th>
                  <th>新しい名前</th>
                </tr>
              </thead>
              <tbody id="fileTableBody"></tbody>
            </table>
          </div>
          <div class="result hidden" id="result">
            <div class="result__icon">✓</div>
            <h3>リネーム完了！</h3>
            <p id="resultText"></p>
          </div>
        </main>
      </div>
    </div>
  </div>

  <section class="features">
    <div class="feature"><strong>プレビュー確認</strong><span>実行前に新しいファイル名を一覧で確認</span></div>
    <div class="feature"><strong>柔軟なルール</strong><span>プレフィックス・連番・文字列置換を組み合わせ</span></div>
    <div class="feature"><strong>安全設計</strong><span>元に戻すログ付き。本番では上書き確認あり</span></div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
