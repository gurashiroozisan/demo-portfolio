<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CRM Lite — 顧客情報・商談ステータス・フォロー予定を一元管理する顧客管理ダッシュボード。">
  <title>CRM Lite 顧客管理 | 業務ツールデモ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="../index.html" class="header__back">← ポートフォリオ</a>
      <div class="header__brand">
        <span class="header__logo">CRM Lite</span>
        <span class="header__sub">顧客管理ダッシュボード</span>
      </div>
      <span class="header__demo">Demo</span>
    </div>
  </header>

  <main class="app">
    <div class="container">
      <div class="app__head">
        <div>
          <p class="label">Customer Management</p>
          <h1>顧客一覧</h1>
          <p class="app__desc">商談ステータスとフォロー予定をひと目で把握。検索・フィルターで必要な顧客にすぐアクセスできます。</p>
        </div>
        <button class="btn btn--primary" id="openModal" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          顧客を追加
        </button>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <span class="kpi-card__icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="kpi-card__label">総顧客数</span>
          <strong class="kpi-card__value" id="kpiTotal">0</strong>
        </div>
        <div class="kpi-card">
          <span class="kpi-card__icon kpi-card__icon--accent" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          </span>
          <span class="kpi-card__label">商談中</span>
          <strong class="kpi-card__value" id="kpiActive">0</strong>
        </div>
        <div class="kpi-card">
          <span class="kpi-card__icon kpi-card__icon--warn" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </span>
          <span class="kpi-card__label">今週フォロー予定</span>
          <strong class="kpi-card__value" id="kpiFollowUp">0</strong>
        </div>
      </div>

      <div class="toolbar">
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="search" id="searchInput" placeholder="名前・会社名・メモで検索" autocomplete="off">
        </div>
        <div class="tabs" id="statusTabs" role="tablist">
          <button class="tab is-active" data-status="all" type="button">すべて</button>
          <button class="tab" data-status="リード" type="button">リード</button>
          <button class="tab" data-status="商談中" type="button">商談中</button>
          <button class="tab" data-status="成約" type="button">成約</button>
          <button class="tab" data-status="休眠" type="button">休眠</button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-card__head">
          <h2>顧客リスト</h2>
          <span class="table-card__count" id="resultCount">0 件</span>
        </div>
        <div class="table-wrap">
          <table id="customerTable">
            <thead>
              <tr>
                <th>氏名</th>
                <th>会社名</th>
                <th>ステータス</th>
                <th>次回フォロー</th>
                <th>メモ</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <p class="empty" id="emptyState" hidden>該当する顧客が見つかりませんでした。</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>&copy; 2026 CRM Lite Demo — 業務ツールポートフォリオ</p></div>
  </footer>

  <!-- Add Customer Modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-labelledby="modalTitle">
      <div class="modal__head">
        <h2 id="modalTitle">顧客を追加</h2>
        <button class="modal__close" type="button" data-close aria-label="閉じる">&times;</button>
      </div>
      <form class="modal__form" id="addForm">
        <label>氏名<input name="name" required placeholder="山田 花子"></label>
        <label>会社名<input name="company" placeholder="株式会社サンプル"></label>
        <label>ステータス
          <select name="status" required>
            <option value="リード">リード</option>
            <option value="商談中">商談中</option>
            <option value="成約">成約</option>
            <option value="休眠">休眠</option>
          </select>
        </label>
        <label>次回フォロー日<input name="followUp" type="date" required></label>
        <label>メモ<textarea name="memo" rows="3" placeholder="商談メモ・フォロー内容"></textarea></label>
        <div class="modal__actions">
          <button class="btn btn--outline" type="button" data-close>キャンセル</button>
          <button class="btn btn--primary" type="submit">追加する</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

</body>
</html>
